[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "citadel-kernel"
version = "0.1.0"
description = "Minimal embeddable Citadel governance kernel — hard cost enforcement + cryptographic audit evidence"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "Apache-2.0"}
authors = [{name = "Anthropic", email = "support@anthropic.com"}]
keywords = ["governance", "cost-control", "audit", "agent", "llm"]
classifiers = [
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

dependencies = [
    "citadel-governance>=0.1.0",
    "httpx>=0.24.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
    "black>=23.0",
    "ruff>=0.1.0",
]

[project.urls]
Homepage = "https://citadelsdk.com"
Documentation = "https://citadelsdk.com/docs"
Repository = "https://github.com/casss20/citadel-sdk"

[tool.setuptools]
packages = ["citadel_kernel"]
