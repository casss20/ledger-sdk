app = "ledger-sdk"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  LOG_LEVEL = "INFO"
  METRICS_ENABLED = "true"
  RATE_LIMIT_REQUESTS = "100"
  RATE_LIMIT_WINDOW_SECONDS = "60"
  REQUIRE_AUTH = "true"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[http_service.checks]]
  grace_period = "5s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/v1/health/live"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
