name: Deploy API to Fly.io

on:
  push:
    branches: [master, main]
    paths:
      - 'apps/runtime/**'
      - 'Dockerfile'
      - 'fly.toml'
      - 'pyproject.toml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Fly.io
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Skip deploy when token is missing
        if: ${{ env.FLY_API_TOKEN == '' }}
        run: |
          echo "FLY_API_TOKEN is not configured; skipping Fly.io deploy."
          echo "Add it in GitHub repository Settings > Secrets and variables > Actions."

      - name: Deploy
        if: ${{ env.FLY_API_TOKEN != '' }}
        run: flyctl deploy --remote-only --app ledger-sdk --config fly.toml
