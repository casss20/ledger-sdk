name: CI / CD — Test & Deploy

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'

jobs:
  # ──────────────────────────────────────────
  # 1. BACKEND LINT & TYPECHECK
  # ──────────────────────────────────────────
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install lint tools
        run: pip install ruff
      - name: Ruff critical check
        run: ruff check apps/runtime/ --select E9,F63,F7,F82

  # ──────────────────────────────────────────
  # 2. BACKEND TESTS
  # ──────────────────────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: [lint-backend]
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: citadel
          POSTGRES_PASSWORD: citadel
          POSTGRES_DB: citadel_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install -e ".[all]"
          pip install pytest pytest-asyncio httpx
      - name: Setup test database
        env:
          PGPASSWORD: citadel
        run: |
          # Database already created by postgres service; apply schema + migrations
          psql -h localhost -U citadel -d citadel_test -f db/schema.sql
          for f in $(ls db/migrations/*.sql | sort); do
            echo "Applying $f"
            psql -h localhost -U citadel -d citadel_test -v ON_ERROR_STOP=1 -f "$f"
          done
      - name: Run unit tests (no DB required)
        env:
          DATABASE_URL: postgresql://citadel:citadel@localhost:5432/citadel_test
          API_KEYS: test-key:admin
          REQUIRE_AUTH: false
          CITADEL_TESTING: true
        run: pytest tests/unit/ tests/tokens/ tests/security/ tests/test_api_key_manager.py tests/test_billing.py tests/test_audit_anchoring.py -v --tb=short

      - name: Run integration tests (requires DB)
        env:
          DATABASE_URL: postgresql://citadel:citadel@localhost:5432/citadel_test
          API_KEYS: test-key:admin
          REQUIRE_AUTH: false
          CITADEL_TESTING: true
        run: pytest tests/integration/ tests/regression/ tests/simulations/ -v --tb=short || true

  # ──────────────────────────────────────────
  # 3. SDK TESTS
  # ──────────────────────────────────────────
  test-sdk:
    name: Test Python SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install SDK
        run: |
          cd packages/sdk-python
          pip install -e ".[dev]"
      - name: Run SDK tests
        run: |
          cd packages/sdk-python
          pytest tests/ -v --tb=short
      - name: Run SDK smoke test
        run: |
          cd packages/sdk-python
          python -c "import citadel_governance as cg; print('SDK import OK, version:', cg.__version__)"

  # ──────────────────────────────────────────
  # 4. FRONTEND BUILD
  # ──────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            apps/dashboard/package-lock.json
            apps/landing/package-lock.json
            apps/dashboard-demo/package-lock.json

      - name: Build Dashboard
        working-directory: apps/dashboard
        run: |
          npm ci
          npm run lint || true
          npm run build

      - name: Build Landing
        working-directory: apps/landing
        run: |
          npm ci
          npm run lint || true
          npm run build

      - name: Build Dashboard Demo
        working-directory: apps/dashboard-demo
        run: |
          npm ci
          npm run build

  # ──────────────────────────────────────────
  # 5. DEPLOY API (Fly.io)
  # ──────────────────────────────────────────
  deploy-api:
    name: Deploy API
    needs: [test-backend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
        if: env.FLY_API_TOKEN != ''
      - name: Deploy to Fly.io
        if: env.FLY_API_TOKEN != ''
        run: flyctl deploy --remote-only --app citadel-sdk --config fly.toml
      - name: Verify deployment
        if: env.FLY_API_TOKEN != ''
        run: |
          sleep 10
          curl -sf https://api.citadelsdk.com/v1/health/live || echo "Health check failed"
      - name: Skip deploy (no token)
        if: env.FLY_API_TOKEN == ''
        run: |
          echo "⚠️ FLY_API_TOKEN not configured. Skipping Fly.io deploy."
          echo "Set it in: GitHub Settings > Secrets and variables > Actions > FLY_API_TOKEN"

  # ──────────────────────────────────────────
  # 6. DEPLOY DASHBOARD (Vercel)
  # ──────────────────────────────────────────
  deploy-dashboard:
    name: Deploy Dashboard
    needs: [build-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/dashboard/package-lock.json
      - name: Install Vercel CLI
        if: env.VERCEL_TOKEN != ''
        run: npm install -g vercel
      - name: Deploy Dashboard
        if: env.VERCEL_TOKEN != ''
        working-directory: apps/dashboard
        run: vercel --token ${{ secrets.VERCEL_TOKEN }} --prod --yes
      - name: Skip deploy (no token)
        if: env.VERCEL_TOKEN == ''
        run: |
          echo "⚠️ VERCEL_TOKEN not configured. Skipping dashboard deploy."

  # ──────────────────────────────────────────
  # 7. DEPLOY LANDING (Vercel)
  # ──────────────────────────────────────────
  deploy-landing:
    name: Deploy Landing
    needs: [build-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/landing/package-lock.json
      - name: Install Vercel CLI
        if: env.VERCEL_TOKEN != ''
        run: npm install -g vercel
      - name: Deploy Landing
        if: env.VERCEL_TOKEN != ''
        working-directory: apps/landing
        run: vercel --token ${{ secrets.VERCEL_TOKEN }} --prod --yes
      - name: Skip deploy (no token)
        if: env.VERCEL_TOKEN == ''
        run: |
          echo "⚠️ VERCEL_TOKEN not configured. Skipping landing deploy."

  # ──────────────────────────────────────────
  # 8. DEPLOY DOCS (Vercel)
  # ──────────────────────────────────────────
  deploy-docs:
    name: Deploy Docs
    needs: [build-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Vercel CLI
        if: env.VERCEL_TOKEN != ''
        run: npm install -g vercel
      - name: Deploy Docs
        if: env.VERCEL_TOKEN != ''
        working-directory: docs/public
        run: vercel --token ${{ secrets.VERCEL_TOKEN }} --prod --yes
      - name: Skip deploy (no token)
        if: env.VERCEL_TOKEN == ''
        run: |
          echo "⚠️ VERCEL_TOKEN not configured. Skipping docs deploy."

  # ──────────────────────────────────────────
  # 9. DEPLOY SDK (PyPI)
  # ──────────────────────────────────────────
  deploy-sdk:
    name: Deploy SDK to PyPI
    needs: [test-sdk]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    env:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Build SDK
        working-directory: packages/sdk-python
        run: |
          pip install build twine
          python -m build
      - name: Publish to PyPI
        if: env.PYPI_API_TOKEN != ''
        working-directory: packages/sdk-python
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
      - name: Skip publish (no token)
        if: env.PYPI_API_TOKEN == ''
        run: |
          echo "⚠️ PYPI_API_TOKEN not configured. Skipping PyPI publish."

