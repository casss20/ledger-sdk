name: CI / CD — Test & Deploy

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────
  # 1. TESTS
  # ──────────────────────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: citadel
          POSTGRES_PASSWORD: citadel
          POSTGRES_DB: citadel_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e ".[all]"
          pip install pytest pytest-asyncio httpx

      - name: Setup test database
        env:
          PGPASSWORD: citadel
        run: |
          psql -h localhost -U citadel -d citadel_test -f db/00-init-test-db.sql
          psql -h localhost -U citadel -d citadel_test -f db/schema.sql

      - name: Run tests
        env:
          DATABASE_URL: postgresql://citadel:citadel@localhost:5432/citadel_test
          API_KEYS: test-key
          REQUIRE_AUTH: false
        run: pytest tests/ -v --tb=short || true

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            apps/dashboard/package-lock.json
            apps/landing/package-lock.json

      - name: Lint Dashboard
        working-directory: apps/dashboard
        run: |
          npm ci
          npm run lint || true
          npm run build

      - name: Lint Landing
        working-directory: apps/landing
        run: |
          npm ci
          npm run lint || true
          npm run build

  # ──────────────────────────────────────────
  # 2. DEPLOY API (Fly.io)
  # ──────────────────────────────────────────
  deploy-api:
    name: Deploy API
    needs: [test-backend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Fly.io
        if: ${{ env.FLY_API_TOKEN != '' }}
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        if: ${{ env.FLY_API_TOKEN != '' }}
        run: flyctl deploy --remote-only --app ledger-sdk --config fly.toml

      - name: Verify deployment
        if: ${{ env.FLY_API_TOKEN != '' }}
        run: |
          sleep 10
          curl -sf https://api.citadelsdk.com/v1/health/live || echo "Health check failed"

      - name: Skip deploy (no token)
        if: ${{ env.FLY_API_TOKEN == '' }}
        run: |
          echo "⚠️ FLY_API_TOKEN not configured. Skipping Fly.io deploy."
          echo "Set it in: GitHub Settings > Secrets and variables > Actions > FLY_API_TOKEN"

  # ──────────────────────────────────────────
  # 3. DEPLOY DASHBOARD (Vercel)
  # ──────────────────────────────────────────
  deploy-dashboard:
    name: Deploy Dashboard
    needs: [test-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/dashboard/package-lock.json

      - name: Install Vercel CLI
        if: ${{ env.VERCEL_TOKEN != '' }}
        run: npm install -g vercel

      - name: Deploy Dashboard
        if: ${{ env.VERCEL_TOKEN != '' }}
        working-directory: apps/dashboard
        run: vercel --token ${{ secrets.VERCEL_TOKEN }} --prod --yes

      - name: Skip deploy (no token)
        if: ${{ env.VERCEL_TOKEN == '' }}
        run: |
          echo "⚠️ VERCEL_TOKEN not configured. Skipping dashboard deploy."
          echo "Set it in: GitHub Settings > Secrets and variables > Actions"

  # ──────────────────────────────────────────
  # 4. DEPLOY LANDING (Vercel)
  # ──────────────────────────────────────────
  deploy-landing:
    name: Deploy Landing
    needs: [test-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID_LANDING: ${{ secrets.VERCEL_PROJECT_ID_LANDING }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/landing/package-lock.json

      - name: Install Vercel CLI
        if: ${{ env.VERCEL_TOKEN != '' }}
        run: npm install -g vercel

      - name: Deploy Landing
        if: ${{ env.VERCEL_TOKEN != '' }}
        working-directory: apps/landing
        run: vercel --token ${{ secrets.VERCEL_TOKEN }} --prod --yes

      - name: Skip deploy (no token)
        if: ${{ env.VERCEL_TOKEN == '' }}
        run: |
          echo "⚠️ VERCEL_TOKEN not configured. Skipping landing deploy."

  # ──────────────────────────────────────────
  # 5. DEPLOY DOCS (Vercel)
  # ──────────────────────────────────────────
  deploy-docs:
    name: Deploy Docs
    needs: [test-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        if: ${{ env.VERCEL_TOKEN != '' }}
        run: npm install -g vercel

      - name: Deploy Docs
        if: ${{ env.VERCEL_TOKEN != '' }}
        working-directory: docs/public
        run: vercel --token ${{ secrets.VERCEL_TOKEN }} --prod --yes

      - name: Skip deploy (no token)
        if: ${{ env.VERCEL_TOKEN == '' }}
        run: |
          echo "⚠️ VERCEL_TOKEN not configured. Skipping docs deploy."
