name: CI / CD — Test & Deploy

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'

jobs:
  # ──────────────────────────────────────────
  # 1. BACKEND LINT
  # ──────────────────────────────────────────
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install lint tools
        run: pip install ruff
      - name: Ruff critical check (syntax / undefined)
        run: ruff check apps/runtime/ --select E9,F63,F7,F82
      - name: Ruff full lint
        run: ruff check apps/runtime/

  # ──────────────────────────────────────────
  # 2. BACKEND TYPECHECK
  # ──────────────────────────────────────────
  typecheck-backend:
    name: Typecheck Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install -e ".[all]"
          pip install mypy
      - name: mypy check
        run: mypy apps/runtime/citadel --ignore-missing-imports --no-error-summary

  # ──────────────────────────────────────────
  # 3. DOCKER SMOKE TEST
  # ──────────────────────────────────────────
  docker-smoke:
    name: Docker Build & Smoke Test
    runs-on: ubuntu-latest
    needs: [lint-backend]
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: citadel
          POSTGRES_PASSWORD: citadel
          POSTGRES_DB: citadel
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t citadel-runtime:ci .
      - name: Verify image imports work
        run: docker run --rm citadel-runtime:ci python -c "import citadel; print('Package import OK')"
      - name: Start API container and wait for readiness
        env:
          CI_NETWORK: host
        run: |
          # Wait for postgres to be ready
          for i in {1..30}; do
            pg_isready -h localhost -U citadel && break
            sleep 1
          done
          # Run the API container pointing at the CI postgres service
          docker run -d --name citadel-api-smoke \
            -e CITADEL_DATABASE_URL=postgresql://citadel:citadel@host.docker.internal:5432/citadel \
            -e CITADEL_JWT_SECRET=ci-smoke-jwt-secret \
            -e CITADEL_API_KEYS=smoke-key:admin \
            -e CITADEL_CORS_ORIGINS=http://localhost:5173 \
            -p 8000:8000 \
            citadel-runtime:ci
          # Wait for readiness (up to 60s)
          for i in {1..60}; do
            if curl -sf http://localhost:8000/v1/health/live; then
              echo "Liveness OK"
              break
            fi
            sleep 1
          done
          for i in {1..60}; do
            if curl -sf http://localhost:8000/v1/health/ready; then
              echo "Readiness OK"
              break
            fi
            sleep 1
          done
          # Verify both endpoints
          curl -sf http://localhost:8000/v1/health/live || (echo "Liveness failed" && exit 1)
          curl -sf http://localhost:8000/v1/health/ready || (echo "Readiness failed" && exit 1)
          echo "Docker smoke test passed"
      - name: Cleanup
        if: always()
        run: |
          docker rm -f citadel-api-smoke || true

  # ──────────────────────────────────────────
  # 4. COMPOSE HEALTH TEST
  # ──────────────────────────────────────────
  compose-health:
    name: Compose Stack Health Test
    runs-on: ubuntu-latest
    needs: [lint-backend]
    steps:
      - uses: actions/checkout@v4
      - name: Create test environment
        run: |
          cat > .env <<EOF
          CITADEL_DEBUG=false
          CITADEL_LOG_LEVEL=INFO
          CITADEL_DATABASE_URL=postgresql://citadel:citadel@postgres:5432/citadel
          CITADEL_JWT_SECRET=ci-compose-jwt-secret
          CITADEL_API_KEYS=compose-key:admin
          CITADEL_ADMIN_BOOTSTRAP_PASSWORD=ci-bootstrap-password
          CITADEL_CORS_ORIGINS=http://localhost:5173
          CITADEL_RATE_LIMIT_REQUESTS=100
          CITADEL_RATE_LIMIT_WINDOW_SECONDS=60
          EOF
      - name: Start compose stack
        run: docker compose up -d --build
      - name: Wait for services
        run: |
          # Wait for API readiness (up to 90s)
          for i in {1..90}; do
            if curl -sf http://localhost:8000/v1/health/ready; then
              echo "API readiness OK"
              break
            fi
            sleep 1
          done
          # Verify both health endpoints
          curl -sf http://localhost:8000/v1/health/live || (echo "Liveness failed" && exit 1)
          curl -sf http://localhost:8000/v1/health/ready || (echo "Readiness failed" && exit 1)
          echo "Compose health test passed"
      - name: Verify logs on failure
        if: failure()
        run: docker compose logs
      - name: Tear down
        if: always()
        run: docker compose down -v

  # ──────────────────────────────────────────
  # 5. BACKEND TESTS
  # ──────────────────────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: [lint-backend, typecheck-backend]
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: citadel
          POSTGRES_PASSWORD: citadel
          POSTGRES_DB: citadel_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install -e ".[all]"
          pip install pytest pytest-asyncio httpx
      - name: Setup test database
        env:
          PGPASSWORD: citadel
        run: |
          # Database already created by postgres service; apply schema + migrations
          psql -h localhost -U citadel -d citadel_test -f db/schema.sql
          for f in $(ls db/migrations/*.sql | sort); do
            echo "Applying $f"
            psql -h localhost -U citadel -d citadel_test -v ON_ERROR_STOP=1 -f "$f"
          done
      - name: Run security tests (with auth enabled)
        env:
          DATABASE_URL: postgresql://citadel:citadel@localhost:5432/citadel_test
          CITADEL_JWT_SECRET: ci-test-jwt-secret-use-random-in-production
          CITADEL_API_KEYS: test-key:admin
          REQUIRE_AUTH: true
          CITADEL_TESTING: true
        run: pytest tests/security/ tests/unit/test_jwt_token.py tests/unit/test_bootstrap_operator.py -v --tb=short

      - name: Run unit tests (no DB required)
        env:
          DATABASE_URL: postgresql://citadel:citadel@localhost:5432/citadel_test
          CITADEL_JWT_SECRET: ci-test-jwt-secret-use-random-in-production
          CITADEL_API_KEYS: test-key:admin
          REQUIRE_AUTH: true
          CITADEL_TESTING: true
        run: pytest tests/unit/ tests/tokens/ tests/test_api_key_manager.py tests/test_billing.py tests/test_audit_anchoring.py -v --tb=short

      - name: Run integration tests (requires DB)
        env:
          DATABASE_URL: postgresql://citadel:citadel@localhost:5432/citadel_test
          CITADEL_JWT_SECRET: ci-test-jwt-secret-use-random-in-production
          CITADEL_API_KEYS: test-key:admin
          REQUIRE_AUTH: true
          CITADEL_TESTING: true
        run: pytest tests/integration/ tests/regression/ tests/simulations/ -v --tb=short

      - name: Run security scan (Bandit)
        run: |
          pip install bandit
          bandit -r apps/runtime/citadel/ -c .bandit -f json -o bandit-report.json -ll
          bandit -r apps/runtime/citadel/ -c .bandit -ll

      - name: Check for known vulnerable dependencies
        run: |
          pip install safety
          safety check --json -o safety-report.json || true
        # safety can flag transitive deps with no fix — keep || true until
        # the project pins a clean dependency set.  Revisit quarterly.

  # ──────────────────────────────────────────
  # 6. SDK LINT & TYPECHECK
  # ──────────────────────────────────────────
  lint-sdk:
    name: Lint Python SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install SDK + lint tools
        run: |
          cd packages/sdk-python
          pip install -e ".[dev]"
      - name: Ruff critical check
        run: |
          cd packages/sdk-python
          ruff check citadel_governance tests --select E9,F63,F7,F82
      - name: Ruff full lint
        run: |
          cd packages/sdk-python
          ruff check citadel_governance tests || true

  typecheck-sdk:
    name: Typecheck Python SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install SDK + mypy
        run: |
          cd packages/sdk-python
          pip install -e ".[dev]"
          pip install mypy
      - name: mypy check
        run: |
          cd packages/sdk-python
          mypy citadel_governance --ignore-missing-imports --no-error-summary || true

  # ──────────────────────────────────────────
  # 7. SDK TESTS
  # ──────────────────────────────────────────
  test-sdk:
    name: Test Python SDK
    runs-on: ubuntu-latest
    needs: [lint-sdk, typecheck-sdk]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install SDK
        run: |
          cd packages/sdk-python
          pip install -e ".[dev]"
      - name: Run SDK tests
        run: |
          cd packages/sdk-python
          pytest tests/ -v --tb=short
      - name: Run SDK smoke test
        run: |
          cd packages/sdk-python
          python -c "import citadel_governance as cg; print('SDK import OK, version:', cg.__version__)"

  # ──────────────────────────────────────────
  # 8. FRONTEND BUILD
  # ──────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            apps/dashboard/package-lock.json
            apps/landing/package-lock.json
            apps/dashboard-demo/package-lock.json

      - name: Build Dashboard
        working-directory: apps/dashboard
        run: |
          npm ci
          npm run lint || true
          npm run build

      - name: Build Landing
        working-directory: apps/landing
        run: |
          npm ci
          npm run lint || true
          npm run build

      - name: Build Dashboard Demo
        working-directory: apps/dashboard-demo
        run: |
          npm ci
          npm run build

  # ──────────────────────────────────────────
  # 9. DEPLOY API (Fly.io)
  # ──────────────────────────────────────────
  deploy-api:
    name: Deploy API
    needs: [test-backend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
        if: env.FLY_API_TOKEN != ''
      - name: Deploy to Fly.io
        if: env.FLY_API_TOKEN != ''
        # App name updated from "citadel-sdk" → "citadel-runtime" for naming consistency
        run: flyctl deploy --remote-only --app citadel-runtime --config fly.toml
      - name: Verify deployment
        if: env.FLY_API_TOKEN != ''
        run: |
          sleep 10
          curl -sf https://api.citadelsdk.com/v1/health/live || echo "Health check failed"
      - name: Skip deploy (no token)
        if: env.FLY_API_TOKEN == ''
        run: |
          echo "⚠️ FLY_API_TOKEN not configured. Skipping Fly.io deploy."
          echo "Set it in: GitHub Settings > Secrets and variables > Actions > FLY_API_TOKEN"

  # ──────────────────────────────────────────
  # 10. DEPLOY DASHBOARD (Vercel)
  # ──────────────────────────────────────────
  deploy-dashboard:
    name: Deploy Dashboard
    needs: [build-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/dashboard/package-lock.json
      - name: Install Vercel CLI
        if: env.VERCEL_TOKEN != ''
        run: npm install -g vercel
      - name: Deploy Dashboard
        if: env.VERCEL_TOKEN != ''
        working-directory: apps/dashboard
        run: vercel --token ${{ secrets.VERCEL_TOKEN }} --prod --yes
      - name: Skip deploy (no token)
        if: env.VERCEL_TOKEN == ''
        run: |
          echo "⚠️ VERCEL_TOKEN not configured. Skipping dashboard deploy."

  # ──────────────────────────────────────────
  # 11. DEPLOY LANDING (Vercel)
  # ──────────────────────────────────────────
  deploy-landing:
    name: Deploy Landing
    needs: [build-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/landing/package-lock.json
      - name: Install Vercel CLI
        if: env.VERCEL_TOKEN != ''
        run: npm install -g vercel
      - name: Deploy Landing
        if: env.VERCEL_TOKEN != ''
        working-directory: apps/landing
        run: vercel --token ${{ secrets.VERCEL_TOKEN }} --prod --yes
      - name: Skip deploy (no token)
        if: env.VERCEL_TOKEN == ''
        run: |
          echo "⚠️ VERCEL_TOKEN not configured. Skipping landing deploy."

  # ──────────────────────────────────────────
  # 10. DEPLOY DOCS (Vercel)
  # ──────────────────────────────────────────
  deploy-docs:
    name: Deploy Docs
    needs: [build-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Vercel CLI
        if: env.VERCEL_TOKEN != ''
        run: npm install -g vercel
      - name: Deploy Docs
        if: env.VERCEL_TOKEN != ''
        working-directory: docs/public
        run: vercel --token ${{ secrets.VERCEL_TOKEN }} --prod --yes
      - name: Skip deploy (no token)
        if: env.VERCEL_TOKEN == ''
        run: |
          echo "⚠️ VERCEL_TOKEN not configured. Skipping docs deploy."

  # ──────────────────────────────────────────
  # 11. DEPLOY SDK (PyPI)
  # ──────────────────────────────────────────
  deploy-sdk:
    name: Deploy SDK to PyPI
    needs: [test-sdk]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    env:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Build SDK
        working-directory: packages/sdk-python
        run: |
          pip install build twine
          python -m build
      - name: Publish to PyPI
        if: env.PYPI_API_TOKEN != ''
        working-directory: packages/sdk-python
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
      - name: Skip publish (no token)
        if: env.PYPI_API_TOKEN == ''
        run: |
          echo "⚠️ PYPI_API_TOKEN not configured. Skipping PyPI publish."

