version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: citadel
      POSTGRES_PASSWORD: citadel
      POSTGRES_DB: citadel
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/00-init-test-db.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U citadel"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    environment:
      DATABASE_URL: postgresql://citadel:citadel@postgres:5432/citadel
      DB_MIN_SIZE: 2
      DB_MAX_SIZE: 10
      API_KEYS: prod-key-change-me-now,dev-key-for-testing
      REQUIRE_AUTH: true
      RATE_LIMIT_REQUESTS: 100
      RATE_LIMIT_WINDOW_SECONDS: 60
      LOG_LEVEL: INFO
      METRICS_ENABLED: true
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/health/live')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
