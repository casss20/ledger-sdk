version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: citadel
      # SECURITY: Change this in production. Use Docker secrets or .env for real deployments.
      POSTGRES_PASSWORD: citadel
      POSTGRES_DB: citadel
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U citadel"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  # OPTIONAL: Redis for distributed rate limiting and caching.
  # Uncomment to enable cross-instance rate limiting and caching.
  # Without Redis, rate limiting falls back to in-memory (single-instance only).
  # redis:
  #   image: redis:7-alpine
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 5s
  #     timeout: 3s
  #     retries: 3

  api:
    build: .
    restart: unless-stopped
    stop_grace_period: 30s
    env_file:
      - .env
    environment:
      # Override .env defaults for the container network
      CITADEL_DATABASE_URL: postgresql://citadel:citadel@postgres:5432/citadel
      # If CITADEL_API_KEYS is not set in .env, the app will fail startup in production.
      # Set it in .env: CITADEL_API_KEYS=prod-key-1:admin,prod-key-2:read
      #
      # OPTIONAL: Redis connection (uncomment the redis service above to use)
      # CITADEL_REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # Readiness probe: verifies DB connectivity, not just process liveness
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/health/ready')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
